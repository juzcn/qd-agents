[project]
name = "mcp-baidu-search"
version = "1.0.0"
description = "MCP server for baidu-search skill"
authors = [
    { name = "qd-agents", email = "auto-generated@qd-agents.local" }
]
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "mcp[cli] >=1.0.0",
    "pydantic >=2.0.0",
]

[project.scripts]
baidu-search-mcp = "scripts.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"